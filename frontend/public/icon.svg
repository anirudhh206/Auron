<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#030712"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="60%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#7c3aed" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle radial glow behind bolt -->
  <ellipse cx="256" cy="256" rx="180" ry="180" fill="url(#glow)"/>

  <!-- Bolt / lightning shape — Auron logo -->
  <path
    d="M296 80 L172 272 L236 272 L216 432 L340 240 L276 240 Z"
    fill="url(#bolt)"
    filter="url(#shadow)"
  />

  <!-- Highlight on bolt top edge -->
  <path
    d="M296 80 L172 272 L200 272 L296 120 Z"
    fill="white"
    opacity="0.12"
  />
</svg>
